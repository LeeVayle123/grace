<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | LA GRACE SEEMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fond: #0a0a0a;
            --carte: #171717;
            --accent: #f97316;
            --texte: #f3f4f6;
            --muted: #a1a1aa;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--fond);
            color: var(--texte);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--carte);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        h2 { font-size: 1.5rem; margin-bottom: 15px; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.95rem; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn-login:hover { opacity: 0.9; }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">LA GRACE SEEMIN</div>
        <h2>Accès Réservé</h2>
        <p>Veuillez vous identifier pour accéder au tableau de bord.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" required placeholder="Ex: admin">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">S'identifier</button>
        </form>
        
        <a href="/" style="display:block; margin-top:20px; color:var(--muted); text-decoration:none; font-size:0.85rem;">
            <i class="fas fa-arrow-left"></i> Retour à la boutique
        </a>
    </div>
</body>
</html>
