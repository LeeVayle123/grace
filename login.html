<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | LA GRACE SEEMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fond: #050505;
            --carte: #0f0f0f;
            --accent: #f97316;
            --texte: #f9fafb;
            --muted: #9ca3af;
            --bordure: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--fond);
            color: var(--texte);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--carte);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 28px;
            border: 1px solid var(--bordure);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo-conteneur {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            background: #fff;
        }

        .logo-texte {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--texte);
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .logo-texte .accent { color: var(--accent); }

        h2 { font-size: 1.5rem; margin-bottom: 15px; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.95rem; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn-login:hover { opacity: 0.9; }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-conteneur">
            <!-- Logo et Nom de la boutique -->
            <img src="/static/log.jpeg" alt="Logo" class="logo-img" onerror="this.src='https://placehold.co/100x100?text=GRACE'">
            <div class="logo-texte">LA GRACE<br><span class="accent">SEEMIN</span></div>
        </div>
        <h2>Espace Administration</h2>
        <p>Identifiez-vous pour gérer votre boutique.</p>

        <!-- Affichage des messages d'erreur du backend (Flash messages) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Formulaire de Connexion -->
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom d'utilisateur</label>
                <input type="text" name="username" required placeholder="Ex: admin">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Mot de passe</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">S'identifier</button>
        </form>
        
        <a href="/" style="display:block; margin-top:20px; color:var(--muted); text-decoration:none; font-size:0.85rem;">
            <i class="fas fa-arrow-left"></i> Retour à la boutique
        </a>
    </div>
</body>
</html>
