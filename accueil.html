<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Boutique Moderne — Noir & Orange Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --fond: #0a0a0a;
            --carte: rgba(255, 255, 255, 0); /* Totalement transparent (100%) */
            --texte: #f3f4f6;
            --accent: #f97316;
            --accent-hover: #ea580c;
            --accent-bg: rgba(249, 115, 22, 0.15);
            --muted: #a1a1aa;
            --rayon: 20px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            /* On utilise bac.png si présent, sinon un dégradé sombre élégant avec une image premium de secours */
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.85)), 
                        url('/static/bac.png'),
                        url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--texte);
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .application {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- En-tete --- */
        .en-tete {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px 5%;
            background: rgba(10, 10, 10, 0.2);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--texte);
            text-decoration: none;
            transition: all 0.5s ease;
        }

        .logo-img {
            height: 40px;
            width: auto;
            border-radius: 50%;
            opacity: 0.9;
        }

        .logo .accent {
            color: var(--accent);
        }

        .conteneur-recherche {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .champ-recherche {
            width: 100%;
            max-width: 500px;
            padding: 14px 24px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: var(--texte);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .champ-recherche:focus {
            outline: none;
            background: #171717;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-bg);
            max-width: 550px;
        }

        .champ-recherche::placeholder {
            color: #71717a;
        }

        .actions-utilisateur {
            display: flex;
            gap: 12px;
        }

        .icone-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texte);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .icone-btn:hover {
            color: white;
            border-color: var(--accent);
            background: var(--accent);
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.25);
            transform: translateY(-3px);
        }

        .badge-compteur {
            position: absolute;
            top: -5px;
            right: -5px;
            background: white;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 800;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            border: 2px solid #171717;
        }

        .contenu-principal {
            padding: 40px 5%;
            flex: 1;
        }

        /* --- Menu Filtres --- */
        .menu-principal {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .menu-principal ul {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            list-style: none;
            padding: 8px;
            margin: 0;
            background: rgba(255, 255, 255, 0);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .item-categorie {
            padding: 10px 24px;
            border-radius: 99px;
            color: var(--muted);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .item-categorie:hover {
            color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        .item-categorie.actif {
            background: var(--accent);
            color: white;
            box-shadow: 0 6px 15px rgba(249, 115, 22, 0.3);
            font-weight: 600;
        }

        /* --- Bannière Héro --- */
        .banniere {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .banniere-contenu {
            max-width: 800px;
            z-index: 2;
        }

        .badge-nouveau {
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .titre-banniere {
            font-size: 3.5rem;
            margin: 20px 0;
            line-height: 1.1;
            font-weight: 800;
            color: var(--texte);
        }

        .sous-titre {
            font-size: 1.2rem;
            color: var(--muted);
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .cta {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-principal {
            background: transparent;
            color: var(--accent);
            padding: 16px 32px;
            border: 2px solid var(--accent);
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-principal:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-bg);
        }

        .btn-secondaire {
            background: transparent;
            color: var(--texte);
            padding: 16px 32px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondaire:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        .banniere-illustration {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5%;
        }

        /* --- Section des Grilles --- */
        .titre-section {
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--texte);
            letter-spacing: -0.5px;
        }

        .grille-produits {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* --- Cartes Produit --- */
        .carte-produit {
            background: var(--carte);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            border: 1.5px solid rgba(255, 255, 255, 0.15); /* Encadrement renforcé */
            display: flex;
            flex-direction: column;
            box-shadow: none; /* On retire l'ombre pour la pureté */
            text-align: left;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .visuel-produit {
            height: 240px;
            border-radius: 20px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 16px;
            font-weight: 800;
            background-color: transparent; /* TRANSPARENCE TOTALE ICI */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .etiquette-prix {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: var(--accent);
            padding: 10px 18px;
            border-radius: 100px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            font-size: 1.05rem;
        }

        .infos-produit {
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nom-produit {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: #f3f4f6;
        }

        .categorie-produit {
            margin: 0;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .actions-produit {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .btn-achat {
            flex: 1;
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-details {
            width: 54px;
            background: transparent;
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-achat:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.25);
        }

        .btn-details:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        /* Étoiles & Rating */
        .rating-box {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 4px 0 8px 0;
        }

        .rating-stars {
            color: #f59e0b;
            font-size: 0.95rem;
        }

        .rating-text {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* --- Mega Footer --- */
        .mega-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 5% 40px 5%;
            background: transparent;
            backdrop-filter: blur(20px);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .footer-col h3 {
            font-size: 1.1rem;
            color: var(--texte);
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-col a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .footer-col a:hover {
            color: var(--accent);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .titre-banniere {
                font-size: 2.4rem;
            }

            .banniere {
                flex-direction: column;
                padding: 40px 30px;
                text-align: center;
            }

            .banniere-contenu {
                max-width: 100%;
            }

            .conteneur-recherche {
                display: none;
            }

            .banniere-illustration {
                position: relative;
                width: 100%;
                height: 250px;
                margin-top: 30px;
            }
        }

        /* --- OPTIMISATION MOBILE FINE (< 600px) --- */
        @media (max-width: 600px) {
            .en-tete {
                padding: 12px 4%;
            }

            .logo {
                font-size: 1.3rem;
                width: 100%;
                justify-content: center;
                order: -1; /* Place le logo tout en haut sur mobile */
                margin-bottom: 5px;
            }

            .header-top-row {
                flex-wrap: wrap; /* Permet le retour à la ligne après le logo */
            }

            .logo-img {
                height: 32px;
            }

            .icone-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .contenu-principal {
                padding: 20px 4%;
            }

            /* MENU ROULANT HAMBURGER (Demande Utilisateur) */
            .menu-principal {
                display: none; /* On cache le conteneur principal sur mobile puisqu'il part dans le header */
            }

            .btn-hamburger {
                display: flex !important;
                background: transparent;
                color: white;
                border: none;
                padding: 10px;
                font-size: 1.8rem;
                cursor: pointer;
                align-items: center;
                justify-content: flex-start;
                margin: 0;
            }

            .liste-categories {
                flex-direction: column;
                width: 100%;
                background: rgba(10,10,10,0.96); /* Presque opaque selon la demande */
                backdrop-filter: blur(10px);
                border: none;
                padding: 0;
                margin: 0;
            }

            .item-categorie {
                width: 100%;
                text-align: left; /* Alignement à gauche */
                border-radius: 0;
                padding: 12px 10px;
                border-bottom: 1px solid rgba(255,255,255,0.05); /* Ligne très fine pour séparer */
                font-size: 1.1rem;
                font-weight: 600;
                color: white;
                text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Pour que le texte soit lisible sans fond */
            }
            /* GRILLE 1 COLONNE (Demande Utilisateur) */
            .grille-produits {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .carte-produit {
                padding: 10px;
                border-radius: 20px;
            }

            .visuel-produit {
                height: 350px; /* Grand espace pour voir toute l'image */
                padding: 12px;
                background-size: contain !important; /* Force l'affichage total de l'image sans rien couper */
                background-color: #050505; /* Fond très sombre pour combler le vide */
                border-radius: 16px;
            }

            .etiquette-prix {
                font-size: 0.85rem;
                padding: 6px 12px;
            }

            .nom-produit {
                font-size: 1rem;
            }

            .rating-box {
                display: flex; /* On garde visible pour la 1 colonne */
            }

            .btn-achat {
                padding: 14px;
                font-size: 1rem;
            }

            .btn-details {
                width: 54px;
                padding: 14px;
            }

            .titre-section {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }

            /* Footer */
            .mega-footer {
                grid-template-columns: 1fr;
                gap: 30px;
                text-align: center;
            }

            .footer-col {
                align-items: center !important;
            }

            .footer-bottom {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            /* Contacts Mobile - Affichage Logo Uniquement */
            .grille-contacts {
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                gap: 20px !important;
            }

            .carte-contact {
                background: transparent !important;
                border: none !important;
                padding: 0 !important;
                border-radius: 0 !important;
                width: auto !important;
            }

            .carte-contact .icone-contact {
                width: 40px !important;
                height: 40px !important;
                font-size: 1.2rem !important;
                margin: 0 !important;
            }

            .texte-contact-titre,
            .texte-contact-sous {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const produitsExemples = {{ produits_json | safe }};
        const allCategoriesInit = {{ all_categories | tojson | safe }};
        {% raw %}
        const { useState, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        /* ================== COMPONENTS ================== */

        function Toasts({ toasts }) {
            return (
                <div style={{ position: 'fixed', bottom: 30, left: "50%", transform: "translateX(-50%)", zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 10, pointerEvents: 'none' }}>
                    <AnimatePresence>
                        {toasts.map(t => (
                            <motion.div
                                key={t.id}
                                initial={{ opacity: 0, y: 50, scale: 0.9 }}
                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                exit={{ opacity: 0, scale: 0.9, y: 20 }}
                                style={{ padding: '16px 24px', background: '#262626', border: '1px solid rgba(255,255,255,0.1)', borderBottom: '3px solid var(--accent)', color: 'white', borderRadius: 12, boxShadow: '0 20px 40px rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', gap: 12, fontWeight: '600' }}
                            >
                                <i className="fas fa-check-circle" style={{ color: 'var(--accent)', fontSize: '1.4rem' }}></i>
                                {t.txt}
                            </motion.div>
                        ))}
                    </AnimatePresence>
                </div>
            );
        }

        function PanierLateral({ isOpen, onClose, panier, modifierQuantite }) {
            const total = panier.reduce((acc, p) => acc + (p.prix * p.quantite), 0);

            return (
                <AnimatePresence>
                    {isOpen && (
                        <>
                            {/* Overlay Blur */}
                            <motion.div
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                onClick={onClose}
                                style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(8px)', zIndex: 2000 }}
                            />
                            {/* Drawer */}
                            <motion.div
                                initial={{ x: '100%' }} animate={{ x: 0 }} exit={{ x: '100%' }}
                                transition={{ type: "spring", stiffness: 300, damping: 30 }}
                                style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 450, maxWidth: '100%', background: '#111', zIndex: 2001, borderLeft: '1px solid rgba(255,255,255,0.1)', display: 'flex', flexDirection: 'column', boxShadow: '-20px 0 50px rgba(0,0,0,0.8)' }}
                            >
                                <div style={{ padding: 30, borderBottom: '1px solid rgba(255,255,255,0.05)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <h2 style={{ margin: 0, fontSize: '1.6rem', color: 'white' }}>Mon Panier</h2>
                                    <button onClick={onClose} style={{ background: '#262626', border: 'none', color: '#f3f4f6', cursor: 'pointer', width: 40, height: 40, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>✕</button>
                                </div>
                                <div style={{ flex: 1, overflowY: 'auto', padding: 30, display: 'flex', flexDirection: 'column', gap: 25 }}>
                                    {panier.length === 0 ? (
                                        <div style={{ textAlign: 'center', color: 'var(--muted)', marginTop: 50 }}>
                                            <i className="fas fa-shopping-bag" style={{ fontSize: '3rem', marginBottom: 15, color: '#333' }}></i>
                                            <p>Votre précieux panier est vide.</p>
                                        </div>
                                    ) : (
                                        <AnimatePresence>
                                            {panier.map(item => (
                                                <motion.div layout initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, scale: 0.9 }} key={item.id} style={{ display: 'flex', gap: 15, alignItems: 'center', background: '#171717', padding: 15, border: '1px solid rgba(255,255,255,0.05)', borderRadius: 16 }}>
                                                    <div style={{ width: 70, height: 70, borderRadius: 10, backgroundImage: `url(${item.image})`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat' }} />
                                                    <div style={{ flex: 1 }}>
                                                        <h4 style={{ margin: '0 0 5px 0', fontSize: '1.05rem', color: 'white' }}>{item.nom}</h4>
                                                        <div style={{ color: 'var(--accent)', fontWeight: 'bold' }}>{item.prix} USD</div>
                                                    </div>
                                                    <div style={{ display: 'flex', alignItems: 'center', background: '#262626', borderRadius: 99, padding: '5px 12px', gap: 12 }}>
                                                        <button onClick={() => modifierQuantite(item.id, -1)} style={{ background: 'transparent', border: 'none', color: '#f3f4f6', cursor: 'pointer', fontSize: '1.2rem', padding: 0 }}>−</button>
                                                        <span style={{ fontSize: '1rem', width: 20, textAlign: 'center', fontWeight: 'bold' }}>{item.quantite}</span>
                                                        <button onClick={() => modifierQuantite(item.id, 1)} style={{ background: 'transparent', border: 'none', color: '#f3f4f6', cursor: 'pointer', fontSize: '1.2rem', padding: 0 }}>+</button>
                                                    </div>
                                                </motion.div>
                                            ))}
                                        </AnimatePresence>
                                    )}
                                </div>
                                <div style={{ padding: 30, borderTop: '1px solid rgba(255,255,255,0.05)', background: '#0a0a0a', textAlign: 'center' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 20, fontSize: '1.3rem', fontWeight: 'bold' }}>
                                        <span>Total</span>
                                        <span style={{ color: 'var(--accent)' }}>{total.toLocaleString()} USD</span>
                                    </div>

                                    {/* Logos Mobile Money */}
                                    <div style={{display: 'flex', justifyContent: 'center', gap: 10, marginBottom: 15, flexWrap: 'wrap'}}>

            const [totalAvis, setTotalAvis] = React.useState(0);

                        setLocalLikes(data.likes); 
                        setTotalAvis(data.total_avis);
                    })
                    .catch(() => { });

                // Vérifier si déjà liké localement
                const likedItems = JSON.parse(localStorage.getItem('likedProducts') || '[]');
                if (likedItems.includes(p.id)) {
                    setIsLiked(true);
                }
            }, [p.id]);

            const handleLike = (e) => {
                e.stopPropagation();
                if (isLiked) return; // Un seul like possible

                setIsLiked(true);
                setLocalLikes(prev => prev + 1);

                // Sauvegarde locale
                const likedItems = JSON.parse(localStorage.getItem('likedProducts') || '[]');
                likedItems.push(p.id);
                localStorage.setItem('likedProducts', JSON.stringify(likedItems));

                fetch('/api/avis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_produit: p.id, is_liked: true, commentaire: "" })
                });
            };

            const handleShare = (e) => {
                e.stopPropagation();

                if (navigator.share) {
                    navigator.share({

                    </div>

                    <div className="infos-produit" style={{ paddingTop: '10px' }}>
                        {/* Barre d'interaction style Instagram */}

                        <div style={{ textAlign: 'center', marginBottom: 50 }}>
                            <h2 style={{ fontSize: '2.5rem', fontWeight: 800, margin: '0 0 10px 0' }}>Contactez-<span className="accent">Nous</span></h2>
                            <p style={{ color: 'var(--muted)', fontSize: '1.1rem' }}>Choisissez votre canal préféré pour nous joindre immédiatement.</p>
                        </div>
                        <div className="grille-contacts" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 15 }}>
                            {/* WhatsApp */}
                            <div className="carte-contact" onClick={handleWhatsApp} style={{ background: 'rgba(37, 211, 102, 0.1)', padding: 15, borderRadius: 20, border: '1px solid rgba(37, 211, 102, 0.2)', textAlign: 'center', cursor: 'pointer', transition: 'all 0.5s ease' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                                <div className="icone-contact" style={{ width: 45, height: 45, background: '#25D366', color: 'white', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px', fontSize: '1.2rem' }}>
                                    <i className="fab fa-whatsapp"></i>
                                </div>
                                <h3 className="texte-contact-titre" style={{ margin: '0 0 2px 0', fontSize: '1rem' }}>WhatsApp</h3>
                                <p className="texte-contact-sous" style={{ color: '#25D366', fontWeight: 600, margin: 0, fontSize: '0.8rem' }}>Message</p>
                            </div>

                            {/* TikTok */}
                            <div className="carte-contact" onClick={handleTikTok} style={{ background: 'rgba(255,255,255,0.03)', padding: 15, borderRadius: 20, border: '1px solid rgba(255,255,255,0.1)', textAlign: 'center', cursor: 'pointer', transition: 'all 0.5s ease' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                                <div className="icone-contact" style={{ width: 45, height: 45, background: '#000', color: 'white', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px', fontSize: '1.2rem', border: '1px solid rgba(255,255,255,0.2)' }}>
                                    <i className="fab fa-tiktok"></i>
                                </div>
                                <h3 className="texte-contact-titre" style={{ margin: '0 0 2px 0', fontSize: '1rem' }}>TikTok</h3>
                                <p className="texte-contact-sous" style={{ color: 'var(--muted)', margin: 0, fontSize: '0.8rem' }}>@millionnaire58</p>
                            </div>

                            {/* Instagram */}
                            <div className="carte-contact" onClick={handleinstagram} style={{ background: 'rgba(225, 48, 108, 0.1)', padding: 15, borderRadius: 20, border: '1px solid rgba(225, 48, 108, 0.2)', textAlign: 'center', cursor: 'pointer', transition: 'all 0.5s ease' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                                <div className="icone-contact" style={{ width: 45, height: 45, background: 'linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%)', color: 'white', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px', fontSize: '1.2rem' }}>
                                    <i className="fab fa-instagram"></i>
                                </div>
                                <h3 className="texte-contact-titre" style={{ margin: '0 0 2px 0', fontSize: '1rem' }}>Instagram</h3>
                                <p className="texte-contact-sous" style={{ color: '#bc1888', fontWeight: 600, margin: 0, fontSize: '0.8rem' }}>Suivre</p>
                            </div>

                            {/* Facebook */}
                            <div className="carte-contact" onClick={handleFacebook} style={{ background: 'rgba(24, 119, 242, 0.1)', padding: 15, borderRadius: 20, border: '1px solid rgba(24, 119, 242, 0.2)', textAlign: 'center', cursor: 'pointer', transition: 'all 0.5s ease' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                                <div className="icone-contact" style={{ width: 45, height: 45, background: '#1877F2', color: 'white', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px', fontSize: '1.2rem' }}>
                                    <i className="fab fa-facebook-f"></i>
                                </div>
                                <h3 className="texte-contact-titre" style={{ margin: '0 0 2px 0', fontSize: '1rem' }}>Facebook</h3>
                                <p className="texte-contact-sous" style={{ color: '#1877F2', fontWeight: 600, margin: 0, fontSize: '0.8rem' }}>Page</p>
                            </div>

                            {/* Appel Normal */}
                            <a href="tel:+243000000000" style={{ textDecoration: 'none', color: 'inherit' }}>
                                <div className="carte-contact" style={{ background: 'rgba(249, 115, 22, 0.05)', padding: 15, borderRadius: 20, border: '1px solid var(--accent)', textAlign: 'center', transition: 'all 0.5s ease' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                                    <div className="icone-contact" style={{ width: 45, height: 45, background: 'var(--accent)', color: 'white', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px', fontSize: '1.2rem' }}>
                                        <i className="fas fa-phone-alt"></i>
                                    </div>
                                    <h3 className="texte-contact-titre" style={{ margin: '0 0 2px 0', fontSize: '1rem' }}>Appel</h3>
                                    <p className="texte-contact-sous" style={{ color: 'var(--accent)', fontWeight: 600, margin: 0, fontSize: '0.8rem' }}>Appeler</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </section>
            );
        }

        function App() {
            const [produits] = useState(produitsExemples);
            const categories = useMemo(() => {
                const present = Array.from(new Set(produits.map(p => p.categorie)));
                // On fusionne avec allCategoriesInit pour être sûr de tout voir
                return Array.from(new Set([...allCategoriesInit, ...present]));
            }, [produits]);
            const [filtre, setFiltre] = useState(null);
            const [recherche, setRecherche] = useState("");
            const [produitSelectionne, setProduitSelectionne] = useState(null);
            const [itemsACommander, setItemsACommander] = useState(null);

            // Nouveau Système de Cartes & Toasts
            const [panier, setPanier] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [toasts, setToasts] = useState([]);
            const nbItems = panier.reduce((acc, obj) => acc + obj.quantite, 0);
            const isMobile = window.innerWidth <= 600;

            const produitsFiltres = useMemo(() => {
                return produits.filter(p => {
                    const matchCat = filtre ? p.categorie === filtre : true;
                    const matchRecherche = recherche.trim() === "" ? true : (p.nom.toLowerCase().includes(recherche.toLowerCase()) || p.categorie.toLowerCase().includes(recherche.toLowerCase()));
                    return matchCat && matchRecherche;
                });
            }, [produits, filtre, recherche]);

            function ajouterAuPanier(p) {
                setPanier(prev => {
                    const exist = prev.find(x => x.id === p.id);
                    if (exist) return prev.map(x => x.id === p.id ? { ...x, quantite: x.quantite + 1 } : x);
                    return [...prev, { ...p, quantite: 1 }];
                });

                const toastId = Date.now();
                setToasts(prev => [...prev, { id: toastId, txt: `${p.nom} a été mis au panier avec succès.` }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== toastId)), 3500);
            }

            function finaliserCommande() {
                setPanier([]);
                setItemsACommander(null);
                const toastId = Date.now();
                setToasts(prev => [...prev, { id: toastId, txt: "🎉 Votre commande a été enregistrée avec succès !" }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== toastId)), 5000);
            }

            function modifierQuantite(id, delta) {
                setPanier(prev => prev.map(x => {
                    if (x.id === id) return { ...x, quantite: x.quantite + delta };
                    return x;
                }).filter(x => x.quantite > 0));
            }

            return (
                <div className="application">
                    <Toasts toasts={toasts} />
                    <PanierLateral
                        isOpen={isCartOpen}
                        onClose={() => setIsCartOpen(false)}
                        panier={panier}
                        modifierQuantite={modifierQuantite}
                        onCheckout={(items) => setItemsACommander(items)}
                    />

                    <header className="en-tete">
                        <div className="header-top-row">
                            <div style={{ flex: 1, display: 'flex', alignItems: 'center' }}>
                                {isMobile && (
                                    <div style={{ position: 'relative' }}>
                                        <button className="btn-hamburger" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                            <i className="fas fa-bars"></i>
                                        </button>
                                        <AnimatePresence>
                                            {isMenuOpen && (
                                                <motion.ul 
                                                    className="liste-categories"
                                                    initial={{ height: 0, opacity: 0 }}
                                                    animate={{ height: 'auto', opacity: 1 }}
                                                    exit={{ height: 0, opacity: 0 }}
                                                    style={{ position: 'absolute', top: 50, left: 0, width: 250, zIndex: 200 }}
                                                >
                                                    <li className={"item-categorie " + (filtre === null ? "actif" : "")} onClick={() => {setFiltre(null); setIsMenuOpen(false);}}>Toutes</li>
                                                    {categories.map((c) => (
                                                        <li key={c} className={"item-categorie " + (filtre === c ? "actif" : "")} onClick={() => {setFiltre(c); setIsMenuOpen(false);}}>
                                                            {c}
                                                        </li>
                                                    ))}
                                                </motion.ul>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                )}
                            </div>
                            
                            <motion.a href="#" className="logo" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 2.5, ease: [0.22, 1, 0.36, 1] }}>
                                <img src="/static/log.jpeg" alt="Logo" className="logo-img" onError={(e) => e.target.style.display = 'none'} />
                                <span style={{ opacity: 0.9 }}>LA GRACE <span className="accent">SEEMIN</span></span>
                            </motion.a>

                            <div className="actions-utilisateur" style={{ flex: 1, justifyContent: 'flex-end' }}>
                                <motion.button className="icone-btn" whileTap={{ scale: 0.9 }} title="Contacts" onClick={() => document.getElementById('section-contact').scrollIntoView({ behavior: 'smooth' })}>
                                    <i className="fas fa-address-book"></i>
                                </motion.button>
                                <motion.button className="icone-btn" whileTap={{ scale: 0.9 }} title="Suivre ma commande" onClick={() => window.location.href='/suivi'}>
                                    <i className="fas fa-truck-fast"></i>
                                </motion.button>
                                <motion.button className="icone-btn" whileTap={{ scale: 0.9 }} title="Mon compte"><i className="far fa-user"></i></motion.button>
                                <motion.button className="icone-btn" whileTap={{ scale: 0.9 }} onClick={() => setIsCartOpen(true)}>
                                    <i className="fas fa-shopping-bag"></i>
                                    <AnimatePresence>
                                        {nbItems > 0 && (
                                            <motion.span initial={{ scale: 0 }} animate={{ scale: 1 }} exit={{ scale: 0 }} className="badge-compteur">
                                                {nbItems}
                                            </motion.span>
                                        )}
                                    </AnimatePresence>
                                </motion.button>
                            </div>
                        </div>

                        <div className="conteneur-recherche" style={{ width: '100%', maxWidth: 600 }}>
                            <input aria-label="Recherche" className="champ-recherche" placeholder="Rechercher des produits..." value={recherche} onChange={(e) => setRecherche(e.target.value)} />
                        </div>
                    </header>

                    <main className="contenu-principal">
                        {!isMobile && (
                            <nav className="menu-principal">
                                <ul>
                                    <li className={"item-categorie " + (filtre === null ? "actif" : "")} onClick={() => setFiltre(null)}>La totale</li>
                                    {categories.map((c) => (
                                        <li key={c} className={"item-categorie " + (filtre === c ? "actif" : "")} onClick={() => setFiltre(c)}>{c}</li>
                                    ))}
                                </ul>
                            </nav>
                        )}

                        <Banniere onDecouvrir={() => { window.scrollTo({ top: 600, behavior: 'smooth' }); }} />

                        <section className="sections-produits">
                            <motion.h2 className="titre-section" initial={{ opacity: 0, x: -30 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }}>
                                {filtre ? `Nos arrivages : ${filtre}` : "Notre sélection exclusive"}
                            </motion.h2>
                            <motion.div 
                                layout 
                                className="grille-produits"
                                variants={{
                                    show: {
                                        transition: {
                                            staggerChildren: 0.25
                                        }
                                    }
                                }}
                                initial="hidden"
                                animate="show"
                            >
                                <AnimatePresence mode="popLayout">
                                    {produitsFiltres.map((p) => (
                                        <CarteProduit key={p.id} p={p} onAjouter={ajouterAuPanier} onOuvrirModal={setProduitSelectionne} />
                                    ))}
                                </AnimatePresence>
                            </motion.div>
                        </section>
                    </main>

                    <SectionContact />

                    {/* Rendu des Modals avec AnimatePresence pour les transitions de sortie */}
                    <AnimatePresence>
                        {produitSelectionne && (
                            <ModalProduit
                                key="modal-produit"
                                p={produitSelectionne}
                                onClose={() => setProduitSelectionne(null)}
                                onAjouter={ajouterAuPanier}
                                onCommanderImmediat={(p) => setItemsACommander([{ ...p, quantite: 1 }])}
                            />
                        )}

                        {itemsACommander && (
                            <ModalCheckout
                                key="modal-checkout"
                                items={itemsACommander}
                                onClose={() => setItemsACommander(null)}
                                onSucess={finaliserCommande}
                            />
                        )}
                    </AnimatePresence>

                    {/* Mega Footer Pro */}
                    <footer className="mega-footer">
                        <div className="footer-col" style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>
                            <a href="#" className="logo" style={{ marginBottom: 15, fontSize: '1.4rem' }}>
                                LA GRACE <span className="accent">SEEMIN</span>
                            </a>
                            <p style={{ color: 'var(--muted)', fontSize: '0.9rem', lineHeight: '1.6' }}>La référence de l'élégance et de l'excellence en ligne.</p>
                        </div>
                        <div className="footer-col">
                            <h3>Boutique</h3>
                            <ul>
                                <li><a href="#">Toutes les catégories</a></li>
                                <li><a href="#section-contact">Nous Contacter</a></li>
                                <li><a href="#">Carte Cadeau</a></li>
                            </ul>
                        </div>
                        <div className="footer-col">
                            <h3>Assistance</h3>
                            <ul>
                                <li><a href="/suivi">Suivre ma commande</a></li>
                                <li><a href="#">Retours & Remboursements</a></li>
                                <li><a href="#">Centre de contact</a></li>
                            </ul>
                        </div>
                        <div className="footer-col">
                            <h3>Légal</h3>
                            <ul>
                                <li><a href="#">Conditions générales</a></li>
                                <li><a href="#">Politique de confidentialité</a></li>
                                <li><a href="#">Paiement sécurisé TLS</a></li>
                            </ul>
                        </div>
                    </footer>
                    <div className="footer-bottom">
                        <div>© 2026 LA GRACE SEEMIN. Tous droits réservés.</div>
                        <div style={{ display: 'flex', gap: 15, fontSize: '1.2rem', color: '#f3f4f6' }}>
                            <i className="fab fa-cc-visa"></i>
                            <i className="fab fa-cc-mastercard"></i>
                            <i className="fab fa-cc-paypal"></i>
                            <i className="fab fa-cc-apple-pay"></i>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        {% endraw %}
    </script>
</body>

</html>
